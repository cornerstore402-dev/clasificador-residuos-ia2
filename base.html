<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recicla IA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('index') }}">HOME</a>
    <a href="{{ url_for('edit_class') }}">EDIT DEFAULTS</a>
    <a class="brand" href="{{ url_for('index') }}">recicla!</a>
    <a href="{{ url_for('summary') }}">SUMMARY</a>
    <a href="{{ url_for('add_class') }}">ADD CLASSES</a>
  </nav>

  <main class="container">
    {% if model_error %}
      <div class="alert warning">{{ model_error }}</div>
    {% endif %}
    {% if error %}
      <div class="alert error">{{ error }}</div>
    {% endif %}
    {% if message %}
      <div class="alert success">{{ message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
